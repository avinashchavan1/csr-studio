server:
  # Render injects PORT; default 8080 for local.
  port: ${PORT:8080}
  servlet:
    # All endpoints served under /api → /api/health, /api/csr/generate, ...
    context-path: /api

spring:
  application:
    name: csr-generator
  datasource:
    # Prod: DATABASE_URL = Supabase Supavisor POOLER (port 5432), DB_USERNAME = postgres.<ref>.
    # Local/dev/test default: in-memory H2 in PostgreSQL-compat mode (no external DB needed).
    url: ${DATABASE_URL:jdbc:h2:mem:csrstudio;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  cors:
    # Comma-separated origins. APP_CORS_ALLOWED_ORIGINS overrides; the default already
    # includes the deployed Netlify site so prod works without setting the env var.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://csr-studio-7c0a4c.netlify.app}

logging:
  level:
    com.example.csrgen: INFO
