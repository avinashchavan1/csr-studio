# Last-resort keep-alive for Render free dyno (spins down at 15 min idle).
# Unreliable on free tier (80–260 min observed gaps) — redundant backup only.
# Primary = cron-job.org (5 min), secondary = UptimeRobot (5 min). See DEPLOYMENT.md.
name: keep-alive
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: curl -fsS --retry 2 --retry-delay 3 --max-time 75 https://csr-studio-api-y7ca.onrender.com/api/health
